<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чеклист этапа</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1d23;
      font-size: 13px;
    }

    .app { padding: 10px; }

    /* ── Загрузка ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100px; color: #9ca3af; font-size: 12px; gap: 8px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e5e7eb; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Карточка этапа ── */
    .stage-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .stage-header {
      padding: 10px 12px;
      background: #f8faff;
      border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; gap: 8px;
    }

    .stage-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563eb; flex-shrink: 0;
    }

    .stage-meta { flex: 1; }
    .stage-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
    .stage-name { font-size: 13px; font-weight: 700; color: #1a1d23; margin-top: 1px; }

    /* ── Действия ── */
    .actions-wrap { padding: 10px 12px; }
    .actions-label {
      font-size: 10px; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .action-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .action-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 9px;
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: 7px;
      line-height: 1.4;
    }
    .action-item .ico { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .action-item .txt { color: #374151; font-size: 12px; }

    /* ── БЛОК КВАЛИФИКАЦИИ (особый) ── */
    .qualify-block {
      margin: 0 12px 12px;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 2px solid #f59e0b;
      border-radius: 10px;
      padding: 14px;
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: #f59e0b; box-shadow: 0 0 0 0 rgba(245,158,11,0); }
      50% { border-color: #d97706; box-shadow: 0 0 0 4px rgba(245,158,11,0.15); }
    }

    .qualify-icon { font-size: 22px; text-align: center; margin-bottom: 8px; }

    .qualify-hint {
      font-size: 12px; color: #92400e; line-height: 1.5;
      background: #fff7ed; border-radius: 6px; padding: 8px 10px;
      border-left: 3px solid #f59e0b;
      margin-bottom: 12px;
      font-style: italic;
    }

    .qualify-question {
      font-size: 14px; font-weight: 700; color: #1a1d23;
      text-align: center; margin-bottom: 14px; line-height: 1.4;
    }

    /* ── Кнопка ДА (обычная) ── */
    .btn-yes {
      width: 100%;
      padding: 11px 16px;
      background: #2563eb;
      color: #fff;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-yes:hover { background: #1d4ed8; box-shadow: 0 4px 12px rgba(37,99,235,0.35); }
    .btn-yes:active { transform: scale(0.98); }
    .btn-yes:disabled { background: #9ca3af; cursor: not-allowed; box-shadow: none; }

    /* ── Кнопка ДА (для квалификации — большая, заметная) ── */
    .btn-yes-big {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: #fff;
      font-size: 16px; font-weight: 800;
      border: none; border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(22,163,74,0.4);
      letter-spacing: 0.3px;
      animation: btn-pulse 2.5s ease-in-out infinite;
    }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(22,163,74,0.4); }
      50% { box-shadow: 0 6px 24px rgba(22,163,74,0.65); transform: translateY(-1px); }
    }
    .btn-yes-big:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 24px rgba(22,163,74,0.55); animation: none; }
    .btn-yes-big:active { transform: scale(0.98); animation: none; }
    .btn-yes-big:disabled { background: #9ca3af; box-shadow: none; animation: none; transform: none; cursor: not-allowed; }

    /* ── Нижняя секция (кнопка для обычных этапов) ── */
    .btn-wrap { padding: 0 12px 12px; }

    /* ── Успех ── */
    .success-msg {
      display: none;
      align-items: center; gap: 8px;
      padding: 10px 12px;
      background: #ecfdf5; border: 1px solid #6ee7b7; border-radius: 8px;
      color: #065f46; font-size: 12.5px; font-weight: 600;
      margin: 0 12px 12px;
    }
    .success-msg.show { display: flex; }

    /* ── Следующий этап ── */
    .next-hint {
      text-align: center; font-size: 11px; color: #9ca3af;
      padding: 0 12px 10px;
    }
    .next-hint span { color: #2563eb; font-weight: 600; }

    /* ── Ошибка / нет этапа ── */
    .no-stage {
      text-align: center; padding: 24px 16px; color: #9ca3af;
      font-size: 12px; line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="app">
  <div id="loading" class="loading">
    <div class="spinner"></div> Загрузка...
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  КОНФИГУРАЦИЯ ЭТАПОВ
//  Замените STAGE_ID на реальные значения вашей воронки
//  Как узнать ID: откройте в браузере:
//  https://ВАШ_ПОРТАЛ.bitrix24.ru/rest/crm.dealcategory.stage.list?CATEGORY_ID=0
// ══════════════════════════════════════════════════════════
var STAGES = {

  "UC_7Y7034": {
    name: "Взять в работу",
    nextStage: "UC_V303Q6",
    nextStageName: "Квалифицирован",
    actions: [
      { ico: "📥", txt: "Ознакомиться с заявкой" },
      { ico: "📞", txt: "Связаться с клиентом" }
    ]
  },

  "UC_V303Q6": {
    name: "Квалифицирован",
    nextStage: "UC_W3OZDK",
    nextStageName: "Узел составлен",
    qualify: true,
    hint: "Уточните у клиента особенности узла: тип, давление, температуру, диаметр трубы и дополнительные требования.",
    question: "Вы квалифицировали клиента?",
    actions: [
      { ico: "🔍", txt: "Уточнить тип и параметры узла" },
      { ico: "📋", txt: "Записать требования в карточку" }
    ]
  },

  "UC_W3OZDK": {
    name: "Узел составлен",
    nextStage: "UC_YU49TX",
    nextStageName: "Узел согласован",
    actions: [
      { ico: "📐", txt: "Составить спецификацию узла" },
      { ico: "📄", txt: "Подготовить документацию" },
      { ico: "✅", txt: "Проверить комплектность" }
    ]
  },

  "UC_YU49TX": {
    name: "Узел согласован",
    nextStage: null,
    nextStageName: null,
    actions: [
      { ico: "🤝", txt: "Согласовать узел с клиентом" },
      { ico: "✍️", txt: "Получить подтверждение от клиента" },
      { ico: "📁", txt: "Сохранить согласованную документацию" }
    ]
  }

};
// ══════════════════════════════════════════════════════════

var currentDealId = null;

// Загрузка SDK Битрикс24
(function() {
  var s = document.createElement('script');
  s.src = 'https://api.bitrix24.com/api/v1/';
  s.onload = initApp;
  document.head.appendChild(s);
})();

function initApp() {
  BX24.init(function() {
    var info = BX24.placement.info();
    currentDealId = info.options && info.options.ID;
    if (!currentDealId) { showError('Не удалось получить ID сделки'); return; }

    BX24.callMethod('crm.deal.get', { id: currentDealId }, function(res) {
      if (res.error()) { showError('Ошибка загрузки: ' + res.error_description()); return; }
      render(res.data());
    });
  });
}

function render(deal) {
  var stageId = deal.STAGE_ID;
  var cfg = STAGES[stageId];

  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('content');
  el.style.display = 'block';

  if (!cfg) {
    el.innerHTML = '<div class="no-stage">📋 Для текущего этапа<br>действия не настроены.<br><br><small style="font-size:11px">STAGE_ID: ' + stageId + '</small></div>';
    return;
  }

  var actionsHtml = cfg.actions.map(function(a) {
    return '<li class="action-item"><span class="ico">' + a.ico + '</span><span class="txt">' + a.txt + '</span></li>';
  }).join('');

  var nextHtml = cfg.nextStageName
    ? '<div class="next-hint">Следующий этап: <span>' + cfg.nextStageName + '</span></div>'
    : '<div class="next-hint" style="color:#16a34a;font-weight:600">🎯 Это финальный этап</div>';

  var bottomHtml = '';
  if (cfg.qualify) {
    // Особый блок для квалификации
    bottomHtml = `
      <div class="qualify-block">
        <div class="qualify-icon">🔎</div>
        <div class="qualify-hint">${cfg.hint}</div>
        <div class="qualify-question">${cfg.question}</div>
        <button class="btn-yes-big" id="btnConfirm" onclick="doConfirm('${stageId}', '${cfg.nextStage || ''}')">
          ✅ &nbsp;ДА, клиент квалифицирован
        </button>
      </div>
    `;
  } else {
    bottomHtml = `
      <div class="btn-wrap">
        <button class="btn-yes" id="btnConfirm" onclick="doConfirm('${stageId}', '${cfg.nextStage || ''}')">
          ✅ Выполнено — перейти дальше
        </button>
      </div>
    `;
  }

  if (!cfg.nextStage) {
    bottomHtml = '<div class="btn-wrap"><div class="no-stage" style="padding:10px 0">🏁 Финальный этап достигнут</div></div>';
  }

  el.innerHTML = `
    <div class="stage-card">
      <div class="stage-header">
        <div class="stage-dot"></div>
        <div class="stage-meta">
          <div class="stage-label">Текущий этап</div>
          <div class="stage-name">${cfg.name}</div>
        </div>
      </div>
      <div class="actions-wrap">
        <div class="actions-label">📌 Что нужно сделать</div>
        <ul class="action-list">${actionsHtml}</ul>
      </div>
      ${bottomHtml}
      <div class="success-msg" id="successMsg">🎉 Готово! Сделка переведена на следующий этап.</div>
      ${nextHtml}
    </div>
  `;
}

function doConfirm(fromStage, nextStage) {
  if (!nextStage) return;
  var btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.innerHTML = '⏳ Переводим...';

  BX24.callMethod('crm.deal.update', {
    id: currentDealId,
    fields: { STAGE_ID: nextStage }
  }, function(res) {
    if (res.error()) {
      btn.disabled = false;
      btn.innerHTML = STAGES[fromStage].qualify
        ? '✅ &nbsp;ДА, клиент квалифицирован'
        : '✅ Выполнено — перейти дальше';
      alert('Ошибка: ' + res.error_description());
      return;
    }
    btn.style.display = 'none';
    var msg = document.getElementById('successMsg');
    if (msg) msg.classList.add('show');
    setTimeout(function() { BX24.placement.call('reloadDeals'); }, 1800);
  });
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = '<div class="no-stage">⚠️ ' + msg + '</div>';
}
</script>
</body>
</html>
